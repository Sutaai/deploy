name: Rotate files encryption

on:
  schedule:
    - cron: 0 0 1 * * # Every 1st of the month at 0h00
  workflow_dispatch:

jobs:
  rotate:
    environment: production
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # v3.2.0
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: generate-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Sutaai
          repositories: deploy

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install SOPS
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64
          echo "620a9d7e3352ababeca6908cea24a6e8b14ce89a448ddbd3f94f1ef3398f470a  sops-v3.13.1.linux.amd64" | sha256sum -c --ignore-missing -

          mv sops-v3.13.1.linux.amd64 /usr/local/bin/sops
          chmod +x /usr/local/bin/sops

      - id: files
        name: Obtain files list
        uses: ./.github/actions/find-encrypted-files

      - name: Rotate files
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          FILES: ${{ steps.files.outputs.files }}
        run: |
          # Source - https://stackoverflow.com/a/918931
          # Posted by Johannes Schaub - litb, modified by community. See post 'Timeline' for change history
          # Retrieved 2026-06-19, License - CC BY-SA 4.0

          IFS=';' read -ra ADDR <<< "$FILES"
          for i in "${ADDR[@]}"; do
            sops rotate -i "$i"
          done

      - name: Create PR
        # v8.1.1 
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: file-encryption-rotation
          title: "chore: encrypted file rotation"
          body: |
            This is an automated pull request to publish newly rotated encrypted files in the repository's upstream.
          assignees: Sutaai
          reviewers: Sutaai
          commit-message: |
            Automated file encryption rotation

            This is an automatic PR to automatically rotate the file's encryption in the repository.
